modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/erykczy/colorful-lighting/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${mod_home_page}"
logoFile="${mod_icon}"
credits="${mod_credits}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="flywheel"
mandatory=false
versionRange="[1.0.0,1.0.9)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="create"
mandatory=false
versionRange="[6.0.8,6.1.0)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="generations_core"
mandatory=false
versionRange="[1.0.2,)"
ordering="AFTER"
side="BOTH"